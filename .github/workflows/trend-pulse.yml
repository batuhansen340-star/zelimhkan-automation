name: TrendPulse

on:
  schedule:
    - cron: '0 4 * * *'   # 07:00 TR (sabah raporu)
    - cron: '0 16 * * *'  # 19:00 TR (aksam raporu)
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  trend-pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests feedparser python-docx

      - name: Run TrendPulse
        run: python scripts/trend_pulse.py

      - name: Save trend history
        run: |
          git config user.name 'TrendPulse Bot'
          git config user.email 'bot@trendpulse.dev'
          git add data/trend_history.json || true
          git diff --staged --quiet || git commit -m "data: update trend history [skip ci]"
          git push || true
